trigger:
- none

pool:
  name: default   # make sure this is your self-hosted pool

variables:
- group: terraform-secrets

steps:
- task: AzureCLI@2
  displayName: Terraform Init Validate Plan
  inputs:
    azureSubscription: terraform-connection
    scriptType: ps
    scriptLocation: inlineScript
    workingDirectory: $(System.DefaultWorkingDirectory)/terraform
    inlineScript: |
      terraform version

      echo "Terraform Init"
      terraform init -reconfigure

      echo "Terraform Validate"
      terraform validate

      echo "Terraform Plan"
      terraform plan -var-file="env/prod.tfvars" -out=tfplan -input=false

      terraform show -no-color tfplan > tfplan.txt
  env:   # THIS is where TF_VAR must be
    TF_VAR_sql_admin_password: $(sql_admin_password)
    TF_VAR_ssh_public_key: $(ssh_public_key)

- task: PublishBuildArtifacts@1
  inputs:
    pathToPublish: '$(System.DefaultWorkingDirectory)/terraform/tfplan.txt'
    artifactName: tfplan
